<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Up • Login</title>
  <link rel="stylesheet" href="auth.css">
  <script src="auth_front.js" defer></script>
</head>

<body>
  <div id="auth-area">

    <div id="login-box">
      <h3>Login</h3>
      <input id="login-email" placeholder="Email">
      <input id="login-senha" type="password" placeholder="Senha">
      <button id="btnLogin">Entrar</button>
      <p id="irCadastro" style="cursor:pointer;">Criar conta</p>
    </div>

    <div id="register-box" style="display:none;">
      <h3>Cadastrar</h3>
      <input id="register-nome" placeholder="Nome">
      <input type="email" id="register-email" placeholder="Email">
      <input id="register-senha" type="password" placeholder="Senha">
      <button id="btnRegistrar">Cadastrar</button>
      <p id="irLogin" style="cursor:pointer;">Já tenho conta</p>
    </div>

  </div>
</body>
</html>
