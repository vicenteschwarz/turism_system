<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel Up • Cadastro de Viagens</title>
  <link rel="stylesheet" href="style.css" />
  <script src="index.js" defer></script>
</head>

<div id="carrinhoOverlay" class="carrinho-overlay">
  <div class="carrinho-panel">
    <div class="carrinho-header">
      <h3>Seu Carrinho</h3>
      <button onclick="fecharCarrinho()" class="fechar-carrinho">X</button>
    </div>

    <div id="carrinhoLista"></div>
    <div class="cart-total-box">
      <span>Total</span>
      <strong id="cart-total">R$ 0,00</strong>
    </div>

    <button id="btnConfirmarCarrinho">Confirmar todas</button>
  </div>
</div>


<body>

  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <h2>Entrar</h2>
      <p>Digite sua senha para identificar seu usuário</p>

      <input id="tokenInput" type="text" placeholder="Digite aqui..." />
      <button id="btnLogin" type="button">Entrar</button>

      <p class="login-msg" id="loginMsg"></p>
    </div>
  </div>


  <header class="topbar">
    <div class="brand">
      <img class="brand_up" src="./assets/travel_up_logo.png" alt="logo travel up" />
      <div>
        <h1 class="big_text">Travel Up</h1>
        <p class="small_text">Cadastro de viagens</p>
      </div>
      <div class="userbar">
        <span id="userInfo"></span>
        <button id="btnLogout" type="button">Sair</button>
      </div>
    </div>


  </header>

  <main>

    <section class="reco-section" id="recoSection">
      <div class="reco-head">
        <h2>Recomendações</h2>
        <p>Escolha um destino e adicione como viagem!</p>
      </div>

      <div class="reco-wrap">
        <button id="recoPrev" class="reco-nav" type="button">‹</button>

        <div id="recoList" class="reco-slider"></div>

        <button id="recoNext" class="reco-nav" type="button">›</button>
      </div>
    </section>

    <!-- MODAL: COMPRAR A PARTIR DA RECOMENDAÇÃO -->
    <div class="modal" id="modalReco">
      <div class="modal-content">
        <h2>Adicionar viagem</h2>

        <div class="modal-grid">
          <div class="modal-row">
            <span class="muted">Destino</span>
            <strong id="recoDestinoTxt">-</strong>
          </div>

          <div class="modal-row">
            <span class="muted">Preço</span>
            <strong id="recoPrecoTxt">-</strong>
          </div>

          <div class="modal-row">
            <span class="muted">Ida</span>
            <strong id="recoIdaTxt">-</strong>
          </div>

          <div class="modal-row">
            <span class="muted">Volta</span>
            <strong id="recoVoltaTxt">-</strong>
          </div>
        </div>

        <input type="text" id="recoComprador" placeholder="Comprador (quem comprou)" />

        <div class="modal-actions">
          <button id="btnComprarReco">Adicionar</button>
          <button id="btnFecharReco" type="button">Cancelar</button>
        </div>
      </div>
    </div>


    <section class="card">
      <h2>Nova Viagem</h2>

      <div class="form">
        <input type="text" id="campoDestino" placeholder="Destino (ex: Gramado - RS)" />

        <input type="text" id="campoCaracteristica" placeholder="Característica (ex: praia, negócios, romântica)" />

        <input type="text" id="campoComprador" placeholder="Comprador (quem cadastrou/comprou)" />

        <label class="label">Data de ida</label>
        <input type="date" id="campoDataIda" />

        <label class="label">Data de volta</label>
        <input type="date" id="campoDataVolta" />

        <button id="btnSalvar">Salvar</button>
      </div>
    </section>

    <!-- MODAL DE EDIÇÃO -->
    <div class="modal" id="modal">
      <div class="modal-content">
        <h2>Editar viagem</h2>

        <input type="text" id="campoDestino_edit" placeholder="Destino" />
        <input type="text" id="campoCaracteristica_edit" placeholder="Característica" />
        <input type="text" id="campoComprador_edit" placeholder="Comprador" />

        <label class="label">Data de ida</label>
        <input type="date" id="campoDataIda_edit" />

        <label class="label">Data de volta</label>
        <input type="date" id="campoDataVolta_edit" />

        <div class="modal-actions">
          <button id="btnSalvar_alteracao">Alterar</button>
          <button id="btnFecharModal" type="button">Cancelar</button>
        </div>
      </div>
    </div>

    <section class="card">
      <h2 id="tituloViagens" class="lista-viagens">Lista de Viagens</h2>

      <div class="actions">
        <button id="btn">Carregar viagens</button>
        <button id="btn_load_more" title="Próxima página">⬅</button>
        <button id="btn_back" title="Página anterior">⮕</button>
      </div>

      <div id="listagem" class="container"></div>
    </section>

  </main>

</body>

</html>
